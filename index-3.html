<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Putzplan" />
  <meta name="theme-color" content="#f5f2ec" />
  <link rel="manifest" href="data:application/manifest+json,{&quot;name&quot;:&quot;WG Putzplan&quot;,&quot;short_name&quot;:&quot;Putzplan&quot;,&quot;start_url&quot;:&quot;.&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;%23f5f2ec&quot;,&quot;theme_color&quot;:&quot;%23f5f2ec&quot;}" />
  <title>WG Putzplan</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #f5f2ec;
      --bg2:         #ffffff;
      --bg3:         #edeae3;
      --mint:        #b8d4c8;
      --mint-deep:   #6a9e89;
      --mint-soft:   #e4f0eb;
      --beige2:      #d4c9b4;
      --text:        #2c2c28;
      --text2:       #6b6860;
      --text3:       #9e9b94;
      --line:        rgba(44,44,40,0.08);
      --line2:       rgba(44,44,40,0.14);
      --accent-f:    #b8899e;
      --accent-f-bg: #f7eef3;
      --accent-m:    #6a9e89;
      --accent-m-bg: #e4f0eb;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    .app {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding-top: env(safe-area-inset-top, 0);
      padding-bottom: env(safe-area-inset-bottom, 0);
    }

    header {
      padding: 28px 24px 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 32px;
      line-height: 1.1;
      color: var(--text);
    }

    .logo em {
      font-style: italic;
      color: var(--mint-deep);
    }

    .current-date {
      font-size: 10px;
      color: var(--text3);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-align: right;
      line-height: 1.7;
      font-weight: 400;
    }

    .deco {
      margin: 18px 24px 0;
      height: 1px;
      background: linear-gradient(to right, var(--mint), var(--beige2), transparent);
    }

    .period-strip {
      margin: 16px 24px 0;
      padding: 14px 18px;
      background: var(--bg2);
      border: 1px solid var(--line2);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .period-nav {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1px solid var(--line2);
      background: var(--bg);
      color: var(--text2);
      font-size: 17px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }

    .period-nav:active { background: var(--mint-soft); border-color: var(--mint); }

    .period-center { text-align: center; }

    .period-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 17px;
      font-weight: 400;
      color: var(--text);
      letter-spacing: 0.02em;
    }

    .period-sub {
      font-size: 10px;
      color: var(--text3);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 3px;
      font-weight: 400;
    }

    .today-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      color: var(--mint-deep);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .today-pulse {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--mint-deep);
      animation: pulse 2.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.3; transform: scale(0.6); }
    }

    .cards {
      padding: 14px 24px;
      display: flex;
      flex-direction: column;
      gap: 9px;
      flex: 1;
    }

    .card {
      background: var(--bg2);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 13px;
      animation: fadeUp 0.35s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card:nth-child(1) { animation-delay: 0.03s; }
    .card:nth-child(2) { animation-delay: 0.07s; }
    .card:nth-child(3) { animation-delay: 0.11s; }
    .card:nth-child(4) { animation-delay: 0.15s; }
    .card:nth-child(5) { animation-delay: 0.19s; }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 500;
      flex-shrink: 0;
      letter-spacing: 0.05em;
    }

    .avatar-f { background: var(--accent-f-bg); color: var(--accent-f); border: 1px solid rgba(184,137,158,0.25); }
    .avatar-m { background: var(--accent-m-bg); color: var(--accent-m); border: 1px solid rgba(106,158,137,0.25); }

    .card-body { flex: 1; min-width: 0; }

    .card-name {
      font-size: 10px;
      color: var(--text3);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 2px;
      font-weight: 400;
    }

    .card-task {
      font-family: 'Cormorant Garamond', serif;
      font-size: 19px;
      font-weight: 400;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.2;
    }

    .card-desc {
      font-size: 10px;
      color: var(--text3);
      margin-top: 2px;
      font-weight: 300;
    }

    .extras {
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    .pill {
      font-size: 9px;
      padding: 3px 9px;
      border-radius: 20px;
      white-space: nowrap;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 400;
    }

    .pill-f     { background: var(--accent-f-bg); color: var(--accent-f); border: 1px solid rgba(184,137,158,0.2); }
    .pill-m     { background: var(--accent-m-bg); color: var(--accent-m); border: 1px solid rgba(106,158,137,0.2); }
    .pill-extra { background: var(--mint-soft);   color: var(--mint-deep); border: 1px solid rgba(106,158,137,0.25); }

    footer {
      padding: 12px 24px 20px;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-info {
      font-size: 10px;
      color: var(--text3);
      letter-spacing: 0.07em;
      text-transform: uppercase;
      line-height: 1.7;
      font-weight: 300;
    }

    .install-btn {
      font-size: 10px;
      padding: 7px 14px;
      border-radius: 20px;
      border: 1px solid var(--mint);
      background: var(--mint-soft);
      color: var(--mint-deep);
      cursor: pointer;
      font-family: 'Jost', sans-serif;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 400;
    }

    .install-btn:active { background: var(--mint); }

    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--text);
      border-radius: 12px;
      padding: 10px 18px;
      font-size: 12px;
      color: var(--bg);
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">WG<br><em>Putzplan</em></div>
    <div class="current-date" id="currentDate"></div>
  </header>

  <div class="deco"></div>

  <div class="period-strip">
    <button class="period-nav" id="prev">‹</button>
    <div class="period-center">
      <div class="period-label" id="periodLabel"></div>
      <div class="period-sub" id="periodSub"></div>
    </div>
    <button class="period-nav" id="next">›</button>
  </div>

  <div class="cards" id="cards"></div>

  <footer>
    <div class="footer-info" id="footerInfo"></div>
    <button class="install-btn" id="installBtn" style="display:none">+ Homescreen</button>
  </footer>
</div>

<div class="toast" id="toast"></div>

<script>
const people = [
  { name: "Nike",    gender: "f", initials: "NK" },
  { name: "Claudia", gender: "f", initials: "CL" },
  { name: "Chrissi", gender: "f", initials: "CH" },
  { name: "Tobi",    gender: "m", initials: "TO" },
  { name: "Dave",    gender: "m", initials: "DV" },
];

const taskDefs = [
  { label: "Küchendienst",    desc: "Herd, Mikro, Arbeitsplatten" },
  { label: "Mülldienst",      desc: "Mülleimer leeren & rausbringen" },
  { label: "Bodendienst",     desc: "Staubsaugen & wischen" },
  { label: "Pfand & Altglas", desc: "Pfandflaschen & Glascontainer" },
  { label: "Mädlsbad",        desc: "Bad putzen & schrubben" },
];

function permutations(arr) {
  if (arr.length <= 1) return [arr];
  return arr.flatMap((v, i) =>
    permutations([...arr.slice(0,i), ...arr.slice(i+1)]).map(p => [v, ...p])
  );
}

const validPerms = permutations([0,1,2,3,4]).filter(p => p[3] !== 4 && p[4] !== 4);

function buildSchedule() {
  const chosen = [validPerms[0]];
  for (const perm of validPerms.slice(1)) {
    if (chosen.length === 6) break;
    const prev = chosen[chosen.length - 1];
    if (!perm.some((t, i) => t === prev[i])) chosen.push(perm);
  }
  return chosen;
}

const SCHEDULE = buildSchedule();
const CYCLE = SCHEDULE.length;
const START_DATE = new Date('2025-04-20');

function getPeriodDates(periodOffset) {
  const msPerPeriod = 14 * 24 * 60 * 60 * 1000;
  const msPerWeek   =  7 * 24 * 60 * 60 * 1000;
  const today = new Date();
  const weeksElapsed  = Math.floor((today - START_DATE) / msPerWeek);
  const currentPeriod = Math.floor(weeksElapsed / 2);
  const targetPeriod  = currentPeriod + periodOffset;
  const start = new Date(START_DATE.getTime() + targetPeriod * msPerPeriod);
  const end   = new Date(start.getTime() + msPerPeriod - 1);
  return { start, end, periodIndex: targetPeriod };
}

const fmt = d => d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit' });
const fmtFull = d => d.toLocaleDateString('de-DE', { weekday: 'short', day: '2-digit', month: 'short' });

let offset = 0;

function render() {
  const { start, end, periodIndex } = getPeriodDates(offset);
  const rotation = periodIndex % CYCLE;
  const row = SCHEDULE[rotation];

  document.getElementById('currentDate').innerHTML = `Heute<br>${fmtFull(new Date())}`;
  document.getElementById('periodLabel').textContent = `${fmt(start)} – ${fmt(end)}`;
  document.getElementById('periodSub').innerHTML = offset === 0
    ? `<span class="today-badge"><span class="today-pulse"></span>Aktuelle Periode</span>`
    : `Rotation ${rotation + 1} von ${CYCLE}`;

  document.getElementById('cards').innerHTML = people.map((p, i) => {
    const task = taskDefs[row[i]];
    return `
      <div class="card">
        <div class="avatar avatar-${p.gender}">${p.initials}</div>
        <div class="card-body">
          <div class="card-name">${p.name}</div>
          <div class="card-task">${task.label}</div>
          <div class="card-desc">${task.desc}</div>
        </div>
        <div class="extras">
          <span class="pill pill-${p.gender}">${p.gender === 'f' ? 'sie' : 'er'}</span>
          ${p.gender === 'm' ? '<span class="pill pill-extra">+ Bad</span>' : ''}
        </div>
      </div>`;
  }).join('');

  document.getElementById('footerInfo').innerHTML =
    `Rotation ${rotation + 1} / ${CYCLE} &nbsp;·&nbsp; Zyklus ${CYCLE * 2} Wochen`;
}

document.getElementById('prev').addEventListener('click', () => { offset--; render(); });
document.getElementById('next').addEventListener('click', () => { offset++; render(); });

let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredPrompt = e;
  document.getElementById('installBtn').style.display = 'block';
});
document.getElementById('installBtn').addEventListener('click', async () => {
  if (!deferredPrompt) { showToast('Safari: Teilen → Zum Home-Bildschirm'); return; }
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  if (outcome === 'accepted') showToast('Installiert! 🌿');
  deferredPrompt = null;
  document.getElementById('installBtn').style.display = 'none';
});
window.addEventListener('appinstalled', () => showToast('Erfolgreich installiert!'));

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

render();
</script>
</body>
</html>
